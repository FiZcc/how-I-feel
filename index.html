<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom → Decay</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="ui-container">
    <div class="music-box">
      <p>🎵 Now Playing</p>
      <audio id="player" controls>
        <source src="music.mp3" type="audio/mpeg">
      </audio>
    </div>
    
    <div class="status-box">
      <h2 id="title">soft bloom</h2>
      <p id="message">a place of flowers, light, and quiet air</p>
      <div class="corruption-bar">
        <div id="corruption-fill"></div>
      </div>
      <p class="corruption-text">Corruption: <span id="corruption-percent">0</span>%</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
